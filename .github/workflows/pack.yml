name: Pack Extensions

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_listed_submit:
        description: Skip AMO listed submit (use when only rebuilding self-signed XPI)
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      name: ${{ steps.meta.outputs.name }}
    env:
      REPORT_ENDPOINT: ${{ secrets.REPORT_ENDPOINT }}
      REPORT_SECRET: ${{ secrets.REPORT_SECRET }}
      CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get version
        id: meta
        run: |
          VERSION=$(jq -r .version manifest.json)
          NAME="icloud-album-downloader"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build extensions
        run: ./build.sh --prod --keep-staging

      - name: Pack Chrome crx
        if: env.CRX_PRIVATE_KEY != ''
        run: |
          npm install -g crx3
          echo "$CRX_PRIVATE_KEY" > /tmp/key.pem
          crx3 staging/chrome \
            -p /tmp/key.pem \
            -o "dist/${{ steps.meta.outputs.name }}-chrome-${{ steps.meta.outputs.version }}.crx"
          rm -f /tmp/key.pem

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.meta.outputs.version }}
          path: |
            dist/
            staging/

  amo-listed:
    needs: build
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/') &&
      needs.build.result == 'success' &&
      (github.event_name == 'push' || inputs.skip_listed_submit != true)
    env:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.version }}

      - name: Install web-ext
        if: env.AMO_API_KEY != '' && env.AMO_API_SECRET != ''
        run: npm install -g web-ext@8

      - name: Submit Firefox xpi to AMO for review (listed)
        if: env.AMO_API_KEY != '' && env.AMO_API_SECRET != ''
        run: |
          set -euo pipefail
          echo "Submitting to AMO (listed channel) via web-ext..."
          web-ext sign \
            --source-dir staging/firefox \
            --channel listed \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --amo-metadata amo-metadata.json \
            --artifacts-dir dist/listed
          rm -rf dist/listed
          echo "::notice::Firefox extension submitted to AMO for review (listed)"

  amo-self-sign:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    env:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.version }}

      - name: Install web-ext
        if: env.AMO_API_KEY != '' && env.AMO_API_SECRET != ''
        run: npm install -g web-ext@8

      - name: Sign Firefox xpi (unlisted — self-distribution)
        if: env.AMO_API_KEY != '' && env.AMO_API_SECRET != ''
        run: |
          set -euo pipefail

          SELF_VERSION="${{ needs.build.outputs.version }}.1"
          rm -rf staging/firefox-self
          cp -r staging/firefox staging/firefox-self
          jq --arg v "$SELF_VERSION" '.version = $v' staging/firefox-self/manifest.json \
            > staging/firefox-self/manifest.json.tmp
          mv staging/firefox-self/manifest.json.tmp staging/firefox-self/manifest.json

          echo "Signing unlisted self-distribution build (version $SELF_VERSION)..."
          web-ext sign \
            --source-dir staging/firefox-self \
            --channel unlisted \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --artifacts-dir dist/signed

          SIGNED=$(ls dist/signed/*.xpi 2>/dev/null | head -1)
          if [ -n "$SIGNED" ]; then
            mkdir -p release-extra
            mv "$SIGNED" "release-extra/${{ needs.build.outputs.name }}-firefox-${{ needs.build.outputs.version }}-self-signed.xpi"
            echo "::notice::Self-distribution XPI signed (version $SELF_VERSION)"
          else
            echo "::warning::Signing succeeded but no signed XPI found in output"
            exit 1
          fi

      - name: Upload self-signed Firefox xpi
        if: env.AMO_API_KEY != '' && env.AMO_API_SECRET != ''
        uses: actions/upload-artifact@v4
        with:
          name: firefox-self-${{ needs.build.outputs.version }}
          path: release-extra/

  release:
    needs: [build, amo-self-sign]
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/') &&
      needs.build.result == 'success'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.version }}

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: firefox-self-${{ needs.build.outputs.version }}
          path: release-extra

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            release-extra/*
